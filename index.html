<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tyrauku's Raid Offer Calculator</title>

<style>
:root{
--bg:#070a12;--bg2:#101827;--card:#151d2e;
--text:#f7f2df;--muted:#aeb8cc;--line:rgba(255,255,255,.12);
--gold:#f5c84b;--green:#35d07f;--red:#ff6262;--blue:#5865F2;
--shadow:0 18px 50px rgba(0,0,0,.35)
}
*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh
}
.wrap{max-width:1280px;margin:auto;padding:18px}

/* HEADER */
header{text-align:center;margin-bottom:16px}
.gold{color:var(--gold)}
.subtitle{color:var(--muted);margin-top:6px}

.links{
display:flex;
justify-content:center;
gap:18px;
margin-top:10px;
flex-wrap:wrap;
}

.link{
text-decoration:none;
font-weight:bold;
font-size:16px;
transition:.2s;
}
.link:hover{opacity:.8;text-decoration:underline}

.youtube{color:#f5c84b}
.discord{color:#5865F2}
.takeover{color:#35d07f}

/* TOP PANEL */
.panel{
background:linear-gradient(180deg,#1c2740,#151d2e);
border:1px solid var(--line);
border-radius:16px;
box-shadow:var(--shadow);
padding:12px;
margin-bottom:12px;
}

.controls{
display:grid;
grid-template-columns:180px 1fr auto auto;
gap:10px;
margin-bottom:10px;
}

input{
width:100%;
border:1px solid var(--line);
background:#0b1120;
color:white;
border-radius:10px;
padding:10px;
}

button{
border:1px solid var(--line);
background:#172239;
color:white;
border-radius:10px;
padding:10px;
cursor:pointer;
}

/* SUMMARY */
.summary{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.metric{
background:#0b1120;
border:1px solid var(--line);
border-radius:10px;
padding:10px;
}

.metric span{color:var(--muted);font-size:12px}
.metric b{display:block;font-size:22px}

/* STATUS */
.status{
margin-top:10px;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.good{background:#35d07f22;color:#9af3c1}
.fair{background:#f5c84b22;color:#ffe08a}
.bad{background:#ff626222;color:#ffb0b0}

/* TABS */
.tabs{
display:flex;
gap:8px;
margin:10px 0;
flex-wrap:wrap;
}

.tab{
padding:8px 12px;
border-radius:999px;
background:#ffffff10;
border:1px solid var(--line);
cursor:pointer;
}

.tab.active{
background:#f5c84b33;
color:white;
}

/* ITEMS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.item{
background:#151d2e;
border:1px solid var(--line);
border-radius:12px;
padding:10px;
}

.itemTop{
display:flex;
align-items:center;
gap:8px;
}

.icon{
width:30px;
height:30px;
object-fit:contain;
}

.name{font-weight:bold}

.qtyline{
display:flex;
justify-content:space-between;
margin-top:6px;
}

.total{font-weight:bold}
</style>
</head>

<body>

<div class="wrap">

<header>
<h1>Tyrauku's <span class="gold">Raid Offer Calculator</span></h1>

<div class="subtitle">
Enter quantities, compare the pack price, and instantly see if it beats your target values.
</div>

<div class="links">
<a href="https://www.youtube.com/@TyRaids" target="_blank" class="link youtube">YouTube</a>
<a href="https://discord.gg/tgmgTc7YpP" target="_blank" class="link discord">Discord</a>
<a href="https://form.jotform.com/220255898373061" target="_blank" class="link takeover">Takeovers</a>
</div>
</header>

<div class="panel">

<div class="controls">
<input id="price" type="number" placeholder="Pack Price">
<input id="search" type="text" placeholder="Search...">
<button onclick="clearQty()">Clear Qty</button>
<button onclick="clearAll()">Reset</button>
</div>

<div class="summary">
<div class="metric"><span>Pack Price</span><b id="mPrice">$0</b></div>
<div class="metric"><span>Value</span><b id="mValue">$0</b></div>
<div class="metric"><span>Diff</span><b id="mDiff">$0</b></div>
<div class="metric"><span>Ratio</span><b id="mRatio">0x</b></div>
</div>

<div id="status" class="status">Add quantities</div>

</div>

<div id="tabs" class="tabs"></div>
<div id="items" class="grid"></div>

</div>

<script>

// ICONS
const ICONS={
"Ancient Shard":"./ancient.png",
"Void Shard":"./void.png",
"Sacred Shard":"./sacred.png",
"Primal Shard":"./primal.png",
"Energy":"./energy.png",
"Energy Refills":"./lightning.png",
"Gems":"./gem.png",
"Barrel":"./barrel.png",
"Brews":"./brew.png"
};

// DATA (shortened here but you can expand with your full list)
const DATA=[
{section:'Regular',item:'Ancient Shard',easy:.98},
{section:'Regular',item:'Void Shard',easy:2.15},
{section:'Regular',item:'Sacred Shard',easy:9.4},
{section:'Regular',item:'Primal Shard',easy:4.3},
{section:'Regular',item:'Energy',easy:.00383},
{section:'Regular',item:'Energy Refills',easy:.5},
{section:'Regular',item:'Gems',easy:.01},
{section:'As Needed',item:'Barrel',easy:.7},
{section:'As Needed',item:'Brews',easy:.0065}
];

let state={qty:{}};
let current="All";

// TABS
function renderTabs(){
const sections=["All",...new Set(DATA.map(x=>x.section))];
tabs.innerHTML=sections.map(s=>`<button class="tab ${s===current?'active':''}" onclick="switchTab('${s}')">${s}</button>`).join("");
}
function switchTab(s){current=s;renderTabs();renderItems();}

// ITEMS
function renderItems(){
const q=search.value.toLowerCase();
items.innerHTML=DATA.filter(x=>(current==="All"||x.section===current)&&x.item.toLowerCase().includes(q))
.map(x=>{
const id=x.item;
const qty=state.qty[id]||"";
const total=qty?qty*x.easy:0;

return `
<div class="item">
<div class="itemTop">
${ICONS[x.item]?`<img src="${ICONS[x.item]}" class="icon">`:''}
<div class="name">${x.item}</div>
</div>

<div class="qtyline">
<input value="${qty}" oninput="updateQty('${id}',this.value)">
<div class="total">$${total.toFixed(2)}</div>
</div>
</div>
`;
}).join("");

updateSummary();
}

// UPDATE
function updateQty(id,val){
val=val.replace(/\D/g,'');
if(val==="") delete state.qty[id];
else state.qty[id]=val;
renderItems();
}

// SUMMARY
function updateSummary(){
let value=0;
for(let k in state.qty){
const item=DATA.find(x=>x.item===k);
if(item) value+=item.easy*state.qty[k];
}
const price=Number(priceInput.value)||0;

mPrice.textContent="$"+price.toFixed(2);
mValue.textContent="$"+value.toFixed(2);
mDiff.textContent="$"+(value-price).toFixed(2);
mRatio.textContent=price?(value/price).toFixed(2)+"x":"0x";

if(!price){status.textContent="Enter pack price";return;}

const ratio=value/price;
status.className="status "+(ratio>1.15?"good":ratio>.95?"fair":"bad");
status.textContent=ratio>1.15?"GOOD DEAL":ratio>.95?"FAIR":"SKIP";
}

// CLEAR
function clearQty(){state.qty={};renderItems();}
function clearAll(){state.qty={};priceInput.value="";renderItems();}

// INIT
const items=document.getElementById("items");
const tabs=document.getElementById("tabs");
const search=document.getElementById("search");
const priceInput=document.getElementById("price");
const mPrice=document.getElementById("mPrice");
const mValue=document.getElementById("mValue");
const mDiff=document.getElementById("mDiff");
const mRatio=document.getElementById("mRatio");
const status=document.getElementById("status");

search.addEventListener("input",renderItems);
priceInput.addEventListener("input",updateSummary);

renderTabs();
renderItems();

</script>

</body>
</html>
