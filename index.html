<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Raid Pack Value Checker</title>

<style>
:root{
--bg:#070a12;--bg2:#101827;--card:#151d2e;
--text:#f7f2df;--muted:#aeb8cc;--line:rgba(255,255,255,.12);
--gold:#f5c84b;--green:#35d07f;--red:#ff6262;--blue:#77a7ff;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--text);
}
.wrap{max-width:1200px;margin:auto;padding:16px}

h1{margin:0;font-size:32px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.item{
background:#151d2e;
border:1px solid var(--line);
border-radius:12px;
padding:10px;
}

.itemTop{
display:flex;
align-items:center;
gap:8px;
}

.icon{
width:32px;
height:32px;
object-fit:contain;
}

.name{
font-weight:bold;
}

.qtyline{
display:flex;
justify-content:space-between;
margin-top:6px;
}

input{
width:80px;
padding:6px;
border-radius:6px;
border:1px solid var(--line);
background:#0b1120;
color:white;
}
</style>
</head>

<body>

<div class="wrap">
<h1>Raid Pack Value Checker</h1>
<div id="items" class="grid"></div>
</div>

<script>

const DATA = [
{item:'Ancient Shard',easy:.98,icon:'./ancient.png'},
{item:'Void Shard',easy:2.15,icon:'./void.png'},
{item:'Sacred Shard',easy:9.4,icon:'./sacred.png'},
{item:'Primal Shard',easy:4.3,icon:'./primal.png'}
];

const container = document.getElementById("items");

DATA.forEach(x=>{
const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<div class="itemTop">
${x.icon ? `<img src="${x.icon}" class="icon" loading="lazy">` : ''}
<div class="name">${x.item}</div>
</div>

<div class="qtyline">
<input type="text" inputmode="numeric" pattern="[0-9]*" value="0">
<div>$${x.easy}</div>
</div>
`;

container.appendChild(div);
});

</script>

</body>
</html>
